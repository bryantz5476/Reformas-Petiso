[build]
  command = "pnpm --filter @workspace/reforma-luxury run build"
  publish = "artifacts/reforma-luxury/dist"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "9"
  PNPM_FLAGS = "--no-frozen-lockfile"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["nodemailer"]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
